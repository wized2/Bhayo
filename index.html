    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        input, textarea {
            user-select: text;
        }

        :root {
            --md-sys-color-primary: #8B5CF6;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EDE9FE;
            --md-sys-color-on-primary-container: #2E1065;
            --md-sys-color-secondary: #6D28D9;
            --md-sys-color-tertiary: #EC489A;
            --md-sys-color-surface: #FFFFFF;
            --md-sys-color-surface-dim: #F8FAFC;
            --md-sys-color-surface-bright: #FFFFFF;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F9FAFB;
            --md-sys-color-surface-container: #F3F4F6;
            --md-sys-color-surface-container-high: #F1F5F9;
            --md-sys-color-surface-container-highest: #FFFFFF;
            --md-sys-color-on-surface: #0F172A;
            --md-sys-color-on-surface-variant: #475569;
            --md-sys-color-outline: #E2E8F0;
            --md-sys-color-outline-variant: #F1F5F9;
            --md-sys-color-shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #A78BFA;
            --md-sys-color-on-primary: #1E1A2F;
            --md-sys-color-primary-container: #2D2A4A;
            --md-sys-color-on-primary-container: #E9DDFF;
            --md-sys-color-secondary: #C084FC;
            --md-sys-color-tertiary: #F472B6;
            --md-sys-color-surface: #0F0F1A;
            --md-sys-color-surface-dim: #0A0A12;
            --md-sys-color-surface-bright: #1A1A2A;
            --md-sys-color-surface-container-lowest: #08080F;
            --md-sys-color-surface-container-low: #12121F;
            --md-sys-color-surface-container: #1A1A2A;
            --md-sys-color-surface-container-high: #222232;
            --md-sys-color-surface-container-highest: #2A2A3A;
            --md-sys-color-on-surface: #F1F5F9;
            --md-sys-color-on-surface-variant: #CBD5E1;
            --md-sys-color-outline: #2D2D3A;
            --md-sys-color-outline-variant: #222232;
            --md-sys-color-shadow: rgba(0,0,0,0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --md-sys-color-primary: #A78BFA;
                --md-sys-color-on-primary: #1E1A2F;
                --md-sys-color-primary-container: #2D2A4A;
                --md-sys-color-on-primary-container: #E9DDFF;
                --md-sys-color-secondary: #C084FC;
                --md-sys-color-tertiary: #F472B6;
                --md-sys-color-surface: #0F0F1A;
                --md-sys-color-surface-dim: #0A0A12;
                --md-sys-color-surface-bright: #1A1A2A;
                --md-sys-color-surface-container-lowest: #08080F;
                --md-sys-color-surface-container-low: #12121F;
                --md-sys-color-surface-container: #1A1A2A;
                --md-sys-color-surface-container-high: #222232;
                --md-sys-color-surface-container-highest: #2A2A3A;
                --md-sys-color-on-surface: #F1F5F9;
                --md-sys-color-on-surface-variant: #CBD5E1;
                --md-sys-color-outline: #2D2D3A;
                --md-sys-color-outline-variant: #222232;
            }
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--md-sys-color-surface-dim);
            min-height: 100vh;
            color: var(--md-sys-color-on-surface);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 70%, rgba(236,72,153,0.08) 0%, transparent 50%);
            transition: opacity 0.3s ease;
        }

        [data-theme="dark"] .ambient-bg {
            background: radial-gradient(ellipse at 20% 30%, rgba(167,139,250,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 70%, rgba(244,114,182,0.12) 0%, transparent 50%);
        }

        .dynamic-blur {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 40% 40%, rgba(139,92,246,0.12) 0%, rgba(236,72,153,0.08) 50%, transparent 80%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: slowDrift 28s infinite alternate ease-in-out;
        }

        [data-theme="dark"] .dynamic-blur {
            background: radial-gradient(circle at 40% 40%, rgba(167,139,250,0.18) 0%, rgba(244,114,182,0.12) 50%, transparent 80%);
        }

        @keyframes slowDrift {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.6; }
            100% { transform: translate(3%, 4%) scale(1.08); opacity: 0.9; }
        }

        .app-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero-section {
            padding: 48px 24px 24px;
            background: transparent;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        .header-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.12);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--md-sys-color-primary);
            border: 0.5px solid rgba(139,92,246,0.2);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-button, .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: var(--md-sys-color-surface-container);
            border: 1px solid var(--md-sys-color-outline);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--md-sys-color-on-surface-variant);
            flex-shrink: 0;
        }

        .search-button:hover, .theme-toggle:hover {
            background: var(--md-sys-color-primary);
            color: white;
            transform: scale(1.02);
        }

        .expanded-search-container {
            margin: 20px 0 8px;
            display: none;
            animation: slideDown 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .expanded-search-container.active {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-bar {
            background: var(--md-sys-color-surface-container);
            border-radius: 60px;
            border: 1px solid var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
        }

        .search-bar:focus-within {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 2px rgba(139,92,246,0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-family: inherit;
            color: var(--md-sys-color-on-surface);
            outline: none;
            padding: 10px 0;
            user-select: text;
        }

        .search-input::placeholder {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.6;
        }

        .close-search {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .close-search:hover {
            background: var(--md-sys-color-surface-container-high);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8B5CF6 0%, #EC489A 50%, #A855F7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subhead {
            font-size: 1.1rem;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            max-width: 500px;
        }

        .results-count {
            padding: 8px 24px;
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
        }

        .members-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 24px;
            background: var(--md-sys-color-surface-container-lowest);
            border-bottom: 1px solid var(--md-sys-color-outline);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.05, 0.7, 0.1, 1);
        }

        .member-row:active {
            background: var(--md-sys-color-surface-container);
            transform: scale(0.99);
        }

        @media (hover: hover) {
            .member-row:hover {
                background: var(--md-sys-color-surface-container);
                padding-left: 28px;
            }
        }

        .member-avatar {
            width: 72px;
            height: 72px;
            border-radius: 32px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--md-sys-color-primary-container), #F3E8FF);
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .member-row:hover .member-avatar {
            border-radius: 28px;
            transform: scale(1.02);
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .member-role {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .member-bio-preview {
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.75;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 85%;
        }

        .chevron-icon {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.6;
        }

        .no-results {
            text-align: center;
            padding: 60px 24px;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
        }

        .app-footer {
            padding: 24px 24px 32px;
            text-align: center;
            border-top: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-container-lowest);
            margin-top: auto;
        }

        .footer-text {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .profile-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--md-sys-color-surface-dim);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .profile-view.active {
            transform: translateX(0);
        }

        .profile-header-edge {
            position: sticky;
            top: 0;
            background: var(--md-sys-color-surface-container-lowest);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--md-sys-color-outline);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .back-button {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: var(--md-sys-color-surface-container);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--md-sys-color-on-surface-variant);
        }

        .back-button:hover {
            background: var(--md-sys-color-primary);
            color: white;
        }

        .profile-hero {
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, rgba(139,92,246,0.05) 0%, rgba(236,72,153,0.05) 100%);
            border-bottom: 1px solid var(--md-sys-color-outline);
        }

        .profile-hero-avatar {
            width: 140px;
            height: 140px;
            border-radius: 70px;
            overflow: hidden;
            border: 4px solid var(--md-sys-color-primary);
            margin-bottom: 20px;
        }

        .profile-hero-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-hero h3 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--md-sys-color-on-surface);
        }

        .info-grid-expressive {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            margin: 24px;
        }

        .info-tile {
            background: var(--md-sys-color-surface-container-lowest);
            padding: 16px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .info-tile .material-symbols-rounded {
            color: var(--md-sys-color-primary);
            font-size: 1.8rem;
        }

        .info-tile-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--md-sys-color-primary);
            margin-bottom: 4px;
        }

        .bio-expanded-full {
            background: var(--md-sys-color-surface-container);
            padding: 24px;
            border-radius: 24px;
            margin: 0 24px 24px;
            line-height: 1.7;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
        }

        .hobbies-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 0 24px 32px;
        }

        .hobby-badge {
            background: var(--md-sys-color-primary-container);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--md-sys-color-on-primary-container);
        }

        @keyframes rowFadeIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .member-row {
            animation: rowFadeIn 0.35s cubic-bezier(0.05, 0.7, 0.1, 1) backwards;
        }

        @media (max-width: 680px) {
            .hero-section { padding: 32px 20px 20px; }
            h1 { font-size: 2.4rem; }
            .member-row { padding: 16px 20px; gap: 16px; }
            .member-avatar { width: 60px; height: 60px; border-radius: 28px; }
            .member-name { font-size: 1.25rem; }
            .profile-hero-avatar { width: 110px; height: 110px; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="dynamic-blur"></div>

    <div class="app-container">
        <div id="homeView" class="home-view">
            <div class="hero-section">
                <div class="header-top">
                    <div class="header-chip">
                        <span class="material-symbols-rounded">diversity_3</span>
                        <span>THE CIRCLE · EST. 2025</span>
                    </div>
                    <div class="action-buttons">
                        <button class="search-button" id="searchButton">
                            <span class="material-symbols-rounded">search</span>
                        </button>
                        <button class="theme-toggle" id="themeToggle">
                            <span class="material-symbols-rounded" id="themeIcon">light_mode</span>
                        </button>
                    </div>
                </div>
                <h1>Team Bhayo</h1>
                <p class="subhead">Connected by spirit, driven by passion — tap any profile to explore.</p>
                
                <div class="expanded-search-container" id="expandedSearch">
                    <div class="search-bar">
                        <span class="material-symbols-rounded">search</span>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, role, or interest..." autocomplete="off">
                        <button class="close-search" id="closeSearch">
                            <span class="material-symbols-rounded">close</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="results-count" id="resultsCount"></div>
            <div class="members-list" id="membersList"></div>

            <footer class="app-footer">
                <div class="footer-text">
                    <span class="material-symbols-rounded">favorite</span>
                    <span>Bhayo Group · United by bond</span>
                    <span class="material-symbols-rounded">diversity_3</span>
                </div>
            </footer>
        </div>

        <div id="profileView" class="profile-view">
            <div class="profile-header-edge">
                <button class="back-button" id="backButton">
                    <span class="material-symbols-rounded">arrow_back</span>
                </button>
                <h2 id="profileHeaderTitle">Profile</h2>
                <div style="width: 44px;"></div>
            </div>
            <div id="profileDynamicContent"></div>
        </div>
    </div>

    <script>
        const familyMembers = [
            { id: 1, name: "Majid", role: "Saljook.Editiz", image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Majid.jpg", age: "24", birthday: "2002", occupation: "Useless", email: "km6483723@gmail.com", phone: "+923073476034", location: "Taj Garh, Rahim Yar Khan", bio: "Majid is a boy who use phone all day and watch movies and TikTok, work on a hotel at night.", hobbies: ["Cooking", "Browsing", "Scrolling"] },
            { id: 2, name: "Ajmal Bhayo", role: "Khalifa Electric", image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Ajmal.jpg", age: "20-25", birthday: "N/A", occupation: "Electric Engineer", email: "N/A", phone: "+92 341 3293399", location: "Taj Garh, Rahim Yar Khan", bio: "Ajmal is a disciplined young man who runs his own electrical shop. He is a master of electrical engineering.", hobbies: ["Work", "Scrolling", "TikTok"] },
            { id: 3, name: "Mubeen Bhayo", role: "😎😎😎", image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Mubeen.jpg", age: "20-25", birthday: "N/A", occupation: "Work", email: "N/A", phone: "+92 309 7469561", bio: "Mubeen is a strong boy, always busy in work, Majid's best friend", hobbies: ["Work", "Gaming", "Music"] },
            { id: 4, name: "Rashid Bhayo", role: "Dark News", image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Rashid.jpg", age: "18", birthday: "N/A", occupation: "Work", email: "mr55368d@gmail.com", phone: "+92 303 4774465", bio: "Rashid is a good boy, he is a good PUBG gammer", hobbies: ["Work", "Gaming", "PUBG", "Music"] },
            { id: 5, name: "Umar Bhayo", role: "Gang", image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Umar.jpg", age: "17-18", birthday: "N/A", occupation: "Work", email: "N/A", phone: "+92 321 4830928", bio: "Umar works at motorcycle repair shop, loves visiting places and watching movies", hobbies: ["Work", "Gaming", "Music", "PUBG", "Tourist"] }
        ];

        let currentSearchQuery = '';

        function filterMembers() {
            const query = currentSearchQuery.toLowerCase().trim();
            if (!query) return familyMembers;
            return familyMembers.filter(member => 
                member.name.toLowerCase().includes(query) ||
                member.role.toLowerCase().includes(query) ||
                (member.bio && member.bio.toLowerCase().includes(query)) ||
                (member.hobbies && member.hobbies.some(h => h.toLowerCase().includes(query)))
            );
        }

        function renderMembersList() {
            const container = document.getElementById('membersList');
            const filtered = filterMembers();
            const resultsCountSpan = document.getElementById('resultsCount');
            
            if (filtered.length === 0) {
                resultsCountSpan.textContent = '';
                container.innerHTML = `<div class="no-results"><span class="material-symbols-rounded" style="font-size: 3rem;">search_off</span><p style="margin-top: 12px;">No members found for "${currentSearchQuery}"</p></div>`;
                return;
            }
            
            resultsCountSpan.textContent = `${filtered.length} member${filtered.length !== 1 ? 's' : ''} found`;
            container.innerHTML = '';
            
            filtered.forEach((member, index) => {
                const row = document.createElement('div');
                row.className = 'member-row';
                row.style.animationDelay = `${index * 0.05}s`;
                row.onclick = () => openProfileView(member);
                const bioPreview = member.bio ? member.bio.substring(0, 65) + (member.bio.length > 65 ? '...' : '') : '';
                row.innerHTML = `
                    <div class="member-avatar"><img src="${member.image || 'https://via.placeholder.com/72?text=No+Photo'}" alt="${member.name}"></div>
                    <div class="member-info">
                        <div class="member-name">${member.name}<span class="member-role">${member.role || 'Member'}</span></div>
                        ${bioPreview ? `<div class="member-bio-preview">${bioPreview}</div>` : ''}
                    </div>
                    <span class="material-symbols-rounded chevron-icon">chevron_right</span>
                `;
                container.appendChild(row);
            });
        }

        function updateSearch(query) {
            currentSearchQuery = query;
            renderMembersList();
        }

        const searchButton = document.getElementById('searchButton');
        const expandedSearch = document.getElementById('expandedSearch');
        const searchInput = document.getElementById('searchInput');
        const closeSearch = document.getElementById('closeSearch');
        
        function openSearchBar() {
            searchButton.style.display = 'none';
            expandedSearch.classList.add('active');
            setTimeout(() => searchInput.focus(), 100);
        }
        
        function closeSearchBar() {
            searchButton.style.display = 'flex';
            expandedSearch.classList.remove('active');
            searchInput.value = '';
            updateSearch('');
        }
        
        searchButton.addEventListener('click', openSearchBar);
        closeSearch.addEventListener('click', closeSearchBar);
        searchInput.addEventListener('input', (e) => updateSearch(e.target.value));
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearchBar(); });
        
        document.addEventListener('click', (e) => {
            if (expandedSearch.classList.contains('active') && !expandedSearch.contains(e.target) && e.target !== searchButton) {
                closeSearchBar();
            }
        });

        function setTheme(theme) {
            if (theme === 'system') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.removeItem('theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }
            updateThemeIcon();
        }
        
        function getCurrentTheme() { return localStorage.getItem('theme') || 'system'; }
        
        function updateThemeIcon() {
            const theme = getCurrentTheme();
            const icon = document.getElementById('themeIcon');
            if (theme === 'light') icon.textContent = 'light_mode';
            else if (theme === 'dark') icon.textContent = 'dark_mode';
            else icon.textContent = 'brightness_auto';
        }
        
        function cycleTheme() {
            const current = getCurrentTheme();
            if (current === 'light') setTheme('dark');
            else if (current === 'dark') setTheme('system');
            else setTheme('light');
        }
        
        document.getElementById('themeToggle').addEventListener('click', cycleTheme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (getCurrentTheme() === 'system') updateThemeIcon();
        });
        
        const saved = getCurrentTheme();
        if (saved !== 'system') document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon();

        function openProfileView(member) {
            const profileView = document.getElementById('profileView');
            document.getElementById('profileHeaderTitle').textContent = member.name;
            const container = document.getElementById('profileDynamicContent');
            
            let infoTiles = '';
            if (member.age) infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">cake</span><div><div class="info-tile-label">Age</div><div>${member.age}</div></div></div>`;
            if (member.occupation) infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">work</span><div><div class="info-tile-label">Occupation</div><div>${member.occupation}</div></div></div>`;
            if (member.email && member.email !== 'N/A') infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">mail</span><div><div class="info-tile-label">Email</div><div>${member.email}</div></div></div>`;
            if (member.phone && member.phone !== 'N/A') infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">call</span><div><div class="info-tile-label">Phone</div><div>${member.phone}</div></div></div>`;
            if (member.location) infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">location_on</span><div><div class="info-tile-label">Location</div><div>${member.location}</div></div></div>`;
            if (member.birthday && member.birthday !== 'N/A') infoTiles += `<div class="info-tile"><span class="material-symbols-rounded">celebration</span><div><div class="info-tile-label">Birthday</div><div>${member.birthday}</div></div></div>`;
            
            container.innerHTML = `
                <div class="profile-hero">
                    <div class="profile-hero-avatar"><img src="${member.image || 'https://via.placeholder.com/140'}" alt="${member.name}"></div>
                    <h3>${member.name}</h3>
                    <div class="member-role" style="margin-top: 8px;">${member.role || 'Team Member'}</div>
                </div>
                <div class="info-grid-expressive">${infoTiles || '<div class="info-tile"><span class="material-symbols-rounded">info</span><div>No additional info available</div></div>'}</div>
                ${member.bio ? `<div class="bio-expanded-full">${member.bio}</div>` : ''}
                ${member.hobbies && member.hobbies.length ? `<div class="hobbies-container">${member.hobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}</div>` : ''}
            `;
            profileView.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeProfileView() {
            document.getElementById('profileView').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        document.getElementById('backButton').addEventListener('click', closeProfileView);
        document.getElementById('profileView').addEventListener('click', (e) => { if (e.target.id === 'profileView') closeProfileView(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && document.getElementById('profileView').classList.contains('active')) closeProfileView(); });
        
        renderMembersList();
    </script>
</body>
</html>
