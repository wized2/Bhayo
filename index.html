<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bhayo Group</title>
    <!-- Google Fonts + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --md-sys-color-primary: #8B5CF6;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EDE9FE;
            --md-sys-color-on-primary-container: #2E1065;
            --md-sys-color-secondary: #6D28D9;
            --md-sys-color-tertiary: #EC489A;
            --md-sys-color-surface: #FFFFFF;
            --md-sys-color-surface-dim: #F8FAFC;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F9FAFB;
            --md-sys-color-surface-container: #F3F4F6;
            --md-sys-color-surface-container-high: #F1F5F9;
            --md-sys-color-on-surface: #0F172A;
            --md-sys-color-on-surface-variant: #475569;
            --md-sys-color-outline: #E2E8F0;
            --md-sys-color-outline-variant: #F1F5F9;
            
            --motion-easing-emphasized: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --motion-easing-decelerate: cubic-bezier(0.05, 0.7, 0.1, 1);
            --motion-duration-medium: 400ms;
            --motion-duration-long: 500ms;
            
            --md-shape-large: 28px;
            --md-shape-full: 999px;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--md-sys-color-surface-dim);
            min-height: 100vh;
            color: var(--md-sys-color-on-surface);
            overflow-x: hidden;
        }

        /* Ambient background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 70%, rgba(236,72,153,0.08) 0%, transparent 50%);
        }

        .dynamic-blur {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 40% 40%, rgba(139,92,246,0.12) 0%, rgba(236,72,153,0.08) 50%, transparent 80%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: slowDrift 28s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.6; }
            100% { transform: translate(3%, 4%) scale(1.08); opacity: 0.9; }
        }

        /* App Container */
        .app-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Home View */
        .home-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hero-section {
            padding: 56px 24px 32px;
            background: transparent;
        }

        .header-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.12);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: var(--md-shape-full);
            margin-bottom: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--md-sys-color-primary);
            border: 0.5px solid rgba(139,92,246,0.2);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8B5CF6 0%, #EC489A 50%, #A855F7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subhead {
            font-size: 1.1rem;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            max-width: 500px;
        }

        /* Members List - Edge to Edge */
        .members-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 24px;
            background: var(--md-sys-color-surface-container-lowest);
            border-bottom: 1px solid var(--md-sys-color-outline);
            cursor: pointer;
            transition: all var(--motion-duration-medium) var(--motion-easing-decelerate);
            position: relative;
        }

        .member-row:active {
            background: var(--md-sys-color-surface-container);
            transform: scale(0.99);
        }

        @media (hover: hover) {
            .member-row:hover {
                background: var(--md-sys-color-surface-container);
                padding-left: 28px;
            }
        }

        .member-avatar {
            width: 72px;
            height: 72px;
            border-radius: 32px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--md-sys-color-primary-container), #F3E8FF);
            flex-shrink: 0;
            transition: all 0.3s var(--motion-easing-emphasized);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .member-row:hover .member-avatar {
            border-radius: 28px;
            transform: scale(1.02);
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .member-role {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .member-bio-preview {
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.75;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 85%;
        }

        .chevron-icon {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.6;
        }

        /* Footer */
        .app-footer {
            padding: 24px 24px 32px;
            text-align: center;
            border-top: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-container-lowest);
            margin-top: auto;
        }

        .footer-text {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-text .material-symbols-rounded {
            font-size: 1rem;
            color: var(--md-sys-color-primary);
        }

        /* ===== FULL EDGE-TO-EDGE PROFILE VIEW (Not a card, full screen) ===== */
        .profile-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--md-sys-color-surface-dim);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.45s var(--motion-easing-emphasized);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .profile-view.active {
            transform: translateX(0);
        }

        /* Edge-to-Edge Profile Header with Back Button */
        .profile-header-edge {
            position: sticky;
            top: 0;
            background: var(--md-sys-color-surface-container-lowest);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--md-sys-color-outline);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .back-button {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: var(--md-sys-color-surface-container);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--md-sys-color-on-surface-variant);
        }

        .back-button:hover {
            background: var(--md-sys-color-primary);
            color: white;
            transform: scale(1.02);
        }

        .back-button .material-symbols-rounded {
            font-size: 1.8rem;
        }

        .profile-header-edge h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
            flex: 1;
        }

        /* Profile Hero - Edge to Edge */
        .profile-hero {
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, rgba(139,92,246,0.05) 0%, rgba(236,72,153,0.05) 100%);
            border-bottom: 1px solid var(--md-sys-color-outline);
        }

        .profile-hero-avatar {
            width: 140px;
            height: 140px;
            border-radius: 70px;
            overflow: hidden;
            border: 4px solid var(--md-sys-color-primary);
            box-shadow: 0 12px 30px rgba(139,92,246,0.25);
            margin-bottom: 20px;
            background: var(--md-sys-color-primary-container);
        }

        .profile-hero-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-hero h3 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 8px;
        }

        .profile-hero-role {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Profile Content - Flowing Edge to Edge */
        .profile-content {
            padding: 24px 20px 40px;
            flex: 1;
        }

        .info-grid-expressive {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .info-tile {
            background: var(--md-sys-color-surface-container-lowest);
            padding: 16px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--md-sys-color-outline-variant);
            transition: all 0.2s;
        }

        .info-tile .material-symbols-rounded {
            font-size: 1.8rem;
            color: var(--md-sys-color-primary);
        }

        .info-tile-content {
            flex: 1;
        }

        .info-tile-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--md-sys-color-primary);
            margin-bottom: 4px;
        }

        .info-tile-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
            word-break: break-word;
        }

        .bio-expanded-full {
            background: var(--md-sys-color-surface-container);
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 32px;
            line-height: 1.7;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            border-left: 5px solid var(--md-sys-color-primary);
        }

        .section-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 28px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--md-sys-color-primary);
        }

        .hobbies-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .hobby-badge {
            background: linear-gradient(115deg, var(--md-sys-color-primary-container), #F9F5FF);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--md-sys-color-on-primary-container);
            transition: all 0.2s;
            border: 0.5px solid rgba(139,92,246,0.2);
        }

        /* Animation for rows */
        @keyframes rowFadeIn {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .member-row {
            animation: rowFadeIn 0.35s var(--motion-easing-decelerate) backwards;
        }
        .member-row:nth-child(1) { animation-delay: 0.02s; }
        .member-row:nth-child(2) { animation-delay: 0.07s; }
        .member-row:nth-child(3) { animation-delay: 0.12s; }
        .member-row:nth-child(4) { animation-delay: 0.17s; }
        .member-row:nth-child(5) { animation-delay: 0.22s; }

        /* Scrollbar */
        .profile-view::-webkit-scrollbar {
            width: 4px;
        }
        .profile-view::-webkit-scrollbar-track {
            background: transparent;
        }
        .profile-view::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-primary);
            border-radius: 10px;
        }

        @media (max-width: 680px) {
            .hero-section {
                padding: 40px 20px 24px;
            }
            h1 {
                font-size: 2.4rem;
            }
            .member-row {
                padding: 16px 20px;
                gap: 16px;
            }
            .member-avatar {
                width: 60px;
                height: 60px;
                border-radius: 28px;
            }
            .member-name {
                font-size: 1.25rem;
            }
            .profile-hero-avatar {
                width: 110px;
                height: 110px;
            }
            .profile-hero h3 {
                font-size: 1.6rem;
            }
            .info-grid-expressive {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="dynamic-blur"></div>

    <div class="app-container">
        <!-- Home View -->
        <div id="homeView" class="home-view">
            <div class="hero-section">
                <div class="header-chip">
                    <span class="material-symbols-rounded">diversity_3</span>
                    <span>THE CIRCLE · EST. 2025</span>
                </div>
                <h1>Team Bhayo</h1>
                <p class="subhead">Connected by spirit, driven by passion — tap any profile to explore the journey.</p>
            </div>

            <div class="members-list" id="membersList">
                <!-- Dynamic rows injected -->
            </div>

            <!-- Footer -->
            <footer class="app-footer">
                <div class="footer-text">
                    <span class="material-symbols-rounded">favorite</span>
                    <span>Bhayo Group · United by bond</span>
                    <span class="material-symbols-rounded">diversity_3</span>
                </div>
            </footer>
        </div>

        <!-- Full Edge-to-Edge Profile View (No card, full screen with back arrow) -->
        <div id="profileView" class="profile-view">
            <div class="profile-header-edge">
                <button class="back-button" id="backButton">
                    <span class="material-symbols-rounded">arrow_back</span>
                </button>
                <h2 id="profileHeaderTitle">Profile</h2>
                <div style="width: 44px;"></div> <!-- spacer for alignment -->
            </div>
            <div id="profileDynamicContent">
                <!-- Dynamic content loads here -->
            </div>
        </div>
    </div>

    <script>
        // Family Data - Full dataset
        const familyMembers = [
            {

            },
            {

                age: "20-25",
                birthday: "N/A",
                occupation: "Electric Engineer",
                email: "N/A",
                phone: "+92 341 3293399",

                hobbies: ["Work", "Scrolling", "TikTok"]
            },
            {
                id: 3,
                name: "Mubeen Bhayo",
                role: "Strong Man",

                occupation: "Work",

                phone: "+92 309 7469561",
                bio: "Mubeen is a strong boy, always busy in work, Majid's best friend",
                hobbies: ["Work", "Gaming", "Music"]
            },  
            {
                id: 4,
                name: "Rashid Bhayo",
                role: "Dark News",
                image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Rashid.jpg",
                age: "18",
                birthday: "N/A",
                occupation: "Work",
                email: "mr55368d@gmail.com",
                phone: "+92 303 4774465",
                bio: "Rashid is a good boy, he is a good PUBG gammer",
                hobbies: ["Work", "Gaming", "PUBG", "Music"]
            },
            {
                id: 5,
                name: "Umar Bhayo",
                role: "Gang",
                image: "https://raw.githubusercontent.com/wized2/Bhayo/refs/heads/main/Umar.jpg",
                age: "17-18",
                birthday: "N/A",
                occupation: "Work",
                email: "N/A",
                phone: "+92 321 4830928",
                bio: "Umar is boy who works at motorcycle repair shop like visiting random places and watching movies",
                hobbies: ["Work", "Gaming", "Music", "PUBG", "Tourist"]
            }
        ];

        // Generate member rows
        function generateMemberRows() {
            const container = document.getElementById('membersList');
            container.innerHTML = '';
            
            familyMembers.forEach(member => {
                const row = document.createElement('div');
                row.className = 'member-row';
                row.onclick = () => openProfileView(member);
                
                const bioPreview = member.bio ? member.bio.substring(0, 65) + (member.bio.length > 65 ? '...' : '') : '';
                
                row.innerHTML = `
                    <div class="member-avatar">
                        <img src="${member.image || 'https://via.placeholder.com/72?text=No+Photo'}" alt="${member.name}">
                    </div>
                    <div class="member-info">
                        <div class="member-name">
                            ${member.name}
                            <span class="member-role">${member.role || 'Member'}</span>
                        </div>
                        ${bioPreview ? `<div class="member-bio-preview">${bioPreview}</div>` : ''}
                    </div>
                    <span class="material-symbols-rounded chevron-icon">chevron_right</span>
                `;
                container.appendChild(row);
            });
        }

        // Open full edge-to-edge profile view (not a card, full screen)
        function openProfileView(member) {
            const profileView = document.getElementById('profileView');
            const profileHeaderTitle = document.getElementById('profileHeaderTitle');
            const profileDynamicContent = document.getElementById('profileDynamicContent');
            
            profileHeaderTitle.textContent = member.name;
            
            // Build dynamic profile content - edge to edge, no card pop-up
            let infoTiles = '';
            
            if (member.age) {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">cake</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Age</div>
                            <div class="info-tile-value">${member.age}</div>
                        </div>
                    </div>
                `;
            }
            if (member.birthday && member.birthday !== 'N/A') {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">celebration</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Birthday</div>
                            <div class="info-tile-value">${member.birthday}</div>
                        </div>
                    </div>
                `;
            }
            if (member.occupation) {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">work</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Occupation</div>
                            <div class="info-tile-value">${member.occupation}</div>
                        </div>
                    </div>
                `;
            }
            if (member.email && member.email !== 'N/A') {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">mail</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Email</div>
                            <div class="info-tile-value">${member.email}</div>
                        </div>
                    </div>
                `;
            }
            if (member.phone && member.phone !== 'N/A') {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">call</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Phone</div>
                            <div class="info-tile-value">${member.phone}</div>
                        </div>
                    </div>
                `;
            }
            if (member.location) {
                infoTiles += `
                    <div class="info-tile">
                        <span class="material-symbols-rounded">location_on</span>
                        <div class="info-tile-content">
                            <div class="info-tile-label">Location</div>
                            <div class="info-tile-value">${member.location}</div>
                        </div>
                    </div>
                `;
            }
            
            // Bio section
            const bioHtml = member.bio ? `
                <div class="bio-expanded-full">
                    <span class="material-symbols-rounded" style="font-size: 1.2rem; vertical-align: middle; margin-right: 8px;">format_quote</span>
                    ${member.bio}
                </div>
            ` : '';
            
            // Hobbies section
            let hobbiesHtml = '';
            if (member.hobbies && member.hobbies.length > 0) {
                hobbiesHtml = `
                    <div class="section-header">
                        <span class="material-symbols-rounded">favorite</span>
                        <span>Interests & Hobbies</span>
                    </div>
                    <div class="hobbies-container">
                        ${member.hobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}
                    </div>
                `;
            }
            
            // Combine everything
            profileDynamicContent.innerHTML = `
                <div class="profile-hero">
                    <div class="profile-hero-avatar">
                        <img src="${member.image || 'https://via.placeholder.com/140?text=No+Photo'}" alt="${member.name}">
                    </div>
                    <h3>${member.name}</h3>
                    <div class="profile-hero-role">${member.role || 'Team Member'}</div>
                </div>
                <div class="profile-content">
                    <div class="info-grid-expressive">
                        ${infoTiles || '<div class="info-tile"><span class="material-symbols-rounded">info</span><div class="info-tile-content"><div class="info-tile-label">Info</div><div class="info-tile-value">No additional details</div></div></div>'}
                    </div>
                    ${bioHtml}
                    ${hobbiesHtml}
                </div>
            `;
            
            // Show profile view with slide animation
            profileView.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeProfileView() {
            const profileView = document.getElementById('profileView');
            profileView.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // Back button event
        document.getElementById('backButton').addEventListener('click', closeProfileView);
        
        // Optional: Close on swipe back (simple)
        let touchStartX = 0;
        const profileView = document.getElementById('profileView');
        
        profileView.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        profileView.addEventListener('touchmove', (e) => {
            const touchEndX = e.touches[0].clientX;
            const deltaX = touchEndX - touchStartX;
            if (deltaX > 60 && profileView.classList.contains('active')) {
                closeProfileView();
            }
        });
        
        // Close with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && profileView.classList.contains('active')) {
                closeProfileView();
            }
        });
        
        // Initialize
        generateMemberRows();
    </script>
</body>
</html>
